name: release

# Cut a release by pushing a tag like v1.24 (or run manually). Builds the
# standalone desktop app on Windows + macOS with PyInstaller (regalia.spec)
# and attaches the archives to the GitHub Release for that tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Regalia-windows
            pack: Compress-Archive -Path dist/Regalia.exe -DestinationPath Regalia-windows.zip
            file: Regalia-windows.zip
          - os: macos-latest
            artifact: Regalia-macos-arm64
            pack: ditto -c -k --sequesterRsrc --keepParent dist/Regalia.app Regalia-macos-arm64.zip
            file: Regalia-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            dashboard/requirements.txt
            dashboard/requirements-dev.txt
      - name: Install dependencies
        working-directory: dashboard
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run the smoke suite first
        working-directory: dashboard
        run: python -m unittest discover -s tests
      - name: Build with PyInstaller
        working-directory: dashboard
        run: pyinstaller --noconfirm regalia.spec
      - name: Probe the frozen mailbox MCP entrypoint
        if: runner.os == 'Windows'
        working-directory: dashboard
        run: python tests/probe_frozen_mcp.py dist/Regalia.exe
      - name: Package
        working-directory: dashboard
        run: ${{ matrix.pack }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dashboard/${{ matrix.file }}

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Regalia-*
          path: release-assets
          merge-multiple: true
      - name: Attach verified builds to one release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
